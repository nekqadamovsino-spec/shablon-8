<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Андрей & Анастасия</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head><body>
<div class='progress'><span id='bar'></span></div>
<section class='slide hero'><div class='glass'><small>27 JUNE 2026</small><h1>Андрей<br>×<br>Анастасия</h1></div></section>
<section class='slide sand'><div><h2>Каждая история начинается со взгляда.</h2></div></section>
<section class='slide wine'><div><h2>Сохраните дату</h2><div class='date'>27•06•2026</div></div></section>
<section class='slide ivory'><div><h2>Будем счастливы видеть вас рядом.</h2><a class='btn'>RSVP</a></div></section>
<script>
const b=document.getElementById('bar');
addEventListener('scroll',()=>{const h=document.documentElement;const p=h.scrollTop/(h.scrollHeight-h.clientHeight);b.style.width=(p*100)+'%';});
</script></body></html>
